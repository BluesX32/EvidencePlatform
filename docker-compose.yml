version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evidence
      POSTGRES_PASSWORD: evidence
      POSTGRES_DB: evidenceplatform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidence -d evidenceplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://evidence:evidence@db:5432/evidenceplatform
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-24}
      BACKEND_CORS_ORIGINS: http://localhost:5173, http://10.249.112.120:5173
      # Used by entrypoint.sh to wait for Postgres before migrating.
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: evidence
      DB_NAME: evidenceplatform
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Named volume keeps node_modules inside the container (Linux binaries,
      # no host platform mismatch).  On every start the CMD runs `npm install`
      # to sync any newly added packages from the mounted package.json without
      # a full image rebuild.  To force a clean reinstall:
      #   docker compose down -v && docker compose up --build
      - frontend_nm:/app/node_modules

volumes:
  pgdata:
  frontend_nm:
