version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evidence
      POSTGRES_PASSWORD: evidence
      POSTGRES_DB: evidenceplatform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidence -d evidenceplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://evidence:evidence@db:5432/evidenceplatform
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-24}
      BACKEND_CORS_ORIGINS: http://localhost:5173, http://10.249.112.120:5173
      # Used by entrypoint.sh to wait for Postgres before migrating.
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: evidence
      DB_NAME: evidenceplatform
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Named volume keeps node_modules inside the container (Linux binaries,
      # no host platform mismatch).  CMD runs `npm install --prefer-offline`
      # on every start to sync newly added packages without a full rebuild.
      #
      # To reset node_modules only (e.g. after adding npm packages):
      #   docker compose stop frontend
      #   docker volume rm evidenceplatform_frontend_nm
      #   docker compose up --build frontend
      - frontend_nm:/app/node_modules

volumes:
  # pgdata is NEVER removed by docker compose down.
  # To wipe the database intentionally: docker volume rm evidenceplatform_pgdata
  pgdata:
    external: false
  frontend_nm:
    external: false
